# git-cliff configuration — Keep-a-Changelog style, Conventional Commits.
# Used by `npm run release` (to draft entries when CHANGELOG's [Unreleased]
# section is empty) and by `npm run changelog:draft` (to preview).

[changelog]
header = ""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\\n") | first | upper_first | trim }}{% if commit.breaking %} (**BREAKING**){% endif %}\
{% endfor %}
{% endfor %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Type → section. Lines that don't match are filtered out (filter_unconventional).
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^style", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI", skip = true },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverted" },
  { message = "^release", skip = true },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
